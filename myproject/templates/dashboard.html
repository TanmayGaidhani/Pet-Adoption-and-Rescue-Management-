{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Dashboard - RescueMate</title>

<link rel="icon" type="image/png" href="{% static 'images/Icon_img.png' %}">
<link rel="stylesheet" href="{% static 'css/login.css' %}">
<style>
  .dashboard-container {
    max-width: 1200px;
    margin: 100px auto;
    padding: 40px;
  }
  .welcome-box {
    background: white;
    padding: 40px;
    border-radius: 10px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    text-align: center;
  }
  .welcome-box h1 {
    color: #333;
    margin-bottom: 20px;
  }
  .welcome-box p {
    color: #666;
    font-size: 18px;
    margin-bottom: 30px;
  }
  .logout-btn {
    padding: 12px 30px;
    background: #f44336;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
  }
  .logout-btn:hover {
    background: #d32f2f;
  }
</style>
</head>
<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar">
  <div class="logo-container">
    <img src="{% static 'images/Icon_img.png' %}" class="logo" alt="RescueMate Logo">
    <h2 class="logo-text">RescueMate</h2>
  </div>

  <ul class="nav-links">
    <li><a href="{% url 'dashboard' %}">Dashboard</a></li>
    <li><a href="{% url 'logout' %}">Logout</a></li>
  </ul>
</nav>

<div class="dashboard-container">
  <div class="welcome-box">
    <h1>Welcome, {{ user_name }}! 🎉</h1>
    <p>You have successfully logged in to RescueMate.</p>
    <p>Your email has been verified and your account is active.</p>
    <a href="{% url 'logout' %}" class="logout-btn">Logout</a>
  </div>
</div>


<script>
// Prevent back button after logout
window.history.pushState(null, "", window.location.href);
window.onpopstate = function() {
    window.history.pushState(null, "", window.location.href);
};

// Check session on page load
window.addEventListener('pageshow', function(event) {
    if (event.persisted) {
        // Page was loaded from cache (back button)
        window.location.reload();
    }
});
</script>

</body>
</html>
