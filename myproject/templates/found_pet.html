{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Found Pets - RescueMate</title>

<link rel="icon" type="image/png" href="{% static 'images/Icon_img.png' %}">
<link rel="stylesheet" href="{% static 'css/found_pet.css' %}?v=3.0">
</head>
<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar">
  <div class="logo-container">
    <img src="{% static 'images/Icon_img.png' %}" class="logo" alt="RescueMate Logo">
    <h2 class="logo-text">RescueMate</h2>
  </div>

  <a href="{% url 'dashboard' %}" class="dashboard-link">Dashboard</a>
</nav>

<!-- ===== FOUND PETS SECTION ===== -->
<section class="found-pets-section">
  <div class="found-pets-container">
    
    <div class="page-header">
      <h1>🔍 Found Pets</h1>
      <p>Browse pets that have been found and are looking for their owners</p>
    </div>

    <!-- Search and Filter -->
    <div class="search-filter-section">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by location, breed, color...">
        <button class="search-btn">🔍</button>
      </div>
      
      <div class="filter-options">
        <select id="animalTypeFilter">
          <option value="">All Animals</option>
          <option value="dog">Dogs</option>
          <option value="cat">Cats</option>
          <option value="bird">Birds</option>
          <option value="rabbit">Rabbits</option>
          <option value="other">Other</option>
        </select>
        
        <select id="cityFilter">
          <option value="">All Cities</option>
          <!-- Cities will be populated dynamically -->
        </select>
      </div>
    </div>

    <!-- Found Pets Grid -->
    <div class="pets-section">
      <div class="pets-grid" id="petsGrid">
        <!-- Pet cards will be loaded here -->
        <div class="loading-message">
          <div class="loading-spinner"></div>
          <p>Loading found pets...</p>
        </div>
      </div>
    </div>

    <!-- No Results Message -->
    <div class="no-results" id="noResults" style="display: none;">
      <div class="no-results-icon">🐾</div>
      <h3>No pets found</h3>
      <p>Try adjusting your search criteria or check back later.</p>
    </div>

  </div>
</section>

<script src="{% static 'js/found_pet.js' %}"></script>

<script>
// Mobile menu toggle
function toggleMobileMenu() {
    const navLinks = document.getElementById('navLinks');
    const hamburger = document.querySelector('.hamburger-menu');
    navLinks.classList.toggle('active');
    hamburger.classList.toggle('active');
}

// User dropdown functions
function toggleUserDropdown(event) {
    event.preventDefault();
    event.stopPropagation();
    const dropdown = document.getElementById('userDropdownMenu');
    dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
}

// Close dropdowns when clicking outside
document.addEventListener('click', function(event) {
    const userDropdown = document.getElementById('userDropdownMenu');
    const userToggle = document.querySelector('.user-dropdown-toggle');
    const navLinks = document.getElementById('navLinks');
    const hamburger = document.querySelector('.hamburger-menu');
    
    // Close user dropdown if clicking outside
    if (!userToggle.contains(event.target) && !userDropdown.contains(event.target)) {
        userDropdown.style.display = 'none';
    }
    
    // Close mobile menu if clicking outside
    if (!navLinks.contains(event.target) && !hamburger.contains(event.target)) {
        navLinks.classList.remove('active');
        hamburger.classList.remove('active');
    }
});

// Prevent back button after logout
window.history.pushState(null, "", window.location.href);
window.onpopstate = function() {
    window.history.pushState(null, "", window.location.href);
};

// Check session on page load
window.addEventListener('pageshow', function(event) {
    if (event.persisted) {
        window.location.reload();
    }
});
</script>

</body>
</html>
